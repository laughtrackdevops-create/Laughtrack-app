<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050507">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>LaughTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--d:#050507;--c:#12121a;--s:#1e1e2a;--i:#16161f;--t1:#f0ece4;--t2:#9b97a0;--t3:#5e5a66;--co:#ff6b5a;--cg:#ff6b5a40;--go:#f5c542;--gg:#f5c54230;--mi:#4ecdc4;--mg:#4ecdc430;--b:#ffffff0a;--bl:#ffffff14;--fd:'Playfair Display',serif;--fb:'DM Sans',sans-serif;--sb:env(safe-area-inset-bottom,0px)}
body{font-family:var(--fb);background:var(--d);color:var(--t1);min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
input{font-family:inherit}
::-webkit-scrollbar{width:0;height:0}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.an{animation:fi .4s ease both}
#root{max-width:480px;margin:0 auto;min-height:100dvh;position:relative}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
</head>
